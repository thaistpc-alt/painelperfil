<script>
const APP = {
  page: "perfil",
  viewCache: {},
  dataCache: {},
  config: null,
  sort: {},
  pageIndex: {},
  titles: {
    perfil: ["Perfil de Saúde", "Visão quantitativa consolidada"],
    patologias: ["Patologias", "Análise das patologias informadas"],
    afastamentos: ["Afastamentos", "Indicadores de afastamentos dos colaboradores"],
    vacinas: ["Vacinas", "Cobertura vacinal e acompanhamento de pendências"],
    exames: ["Exames Complementares", "Acompanhamento de exames ocupacionais"],
    seguimento: ["Seguimento de exames", "Tratativa dos exames de seguimento"],
    acidentes: ["Acidentes Mat. Biológico", "Indicadores dos acidentes com material biológico"]
  }
};

document.addEventListener("DOMContentLoaded", iniciarPortal);

function iniciarPortal() {
  document.querySelectorAll(".menu-item").forEach(btn => {
    btn.addEventListener("click", () => trocarPagina(btn.getAttribute("data-page")));
  });
  document.addEventListener("click", fecharFiltrosAoClicarFora);
  try {
    if (localStorage.getItem("perfilSaudeMenuRecolhido") === "1") document.getElementById("app").classList.add("menu-recolhido");
  } catch (e) {}
  atualizarBotaoMenuRecolhido();
  mostrarLoading("Carregando configurações...");
  google.script.run.withSuccessHandler(ret => {
    APP.config = ret || {};
    trocarPagina("perfil");
  }).withFailureHandler(erro => {
    APP.config = configuracaoFallback();
    trocarPagina("perfil");
  }).carregarConfiguracoes();
}

function configuracaoFallback() {
  return {
    pageSize: 50,
    statusOptions: [
      { nome: "Ativo", selected: true },
      { nome: "Ativo - Reabilitado", selected: true },
      { nome: "Gestante", selected: true },
      { nome: "Desligado", selected: false },
      { nome: "Óbito", selected: false },
      { nome: "Transferido", selected: false },
      { nome: "Suspenso", selected: false },
      { nome: "Aposentado", selected: false },
      { nome: "Afastado pelo INSS", selected: false },
      { nome: "Licença-maternidade", selected: false },
      { nome: "Não informado", selected: true }
    ],
    updatedAt: "-"
  };
}

function alternarMenu() {
  const app = document.getElementById("app");
  const recolhido = app.classList.toggle("menu-recolhido");
  try { localStorage.setItem("perfilSaudeMenuRecolhido", recolhido ? "1" : "0"); } catch (e) {}
  atualizarBotaoMenuRecolhido();
}

function atualizarBotaoMenuRecolhido() {
  const app = document.getElementById("app");
  const btn = document.querySelector(".menu-collapse-btn");
  if (!app || !btn) return;
  const recolhido = app.classList.contains("menu-recolhido");
  const span = btn.querySelector("span");
  const text = btn.querySelector("b");
  if (span) span.textContent = recolhido ? "›" : "«";
  if (text) text.textContent = recolhido ? "Expandir menu" : "Recolher menu";
  btn.title = recolhido ? "Expandir menu" : "Recolher menu";
}

function trocarPagina(page) {
  APP.page = page || "perfil";
  document.querySelectorAll(".menu-item").forEach(btn => btn.classList.toggle("active", btn.getAttribute("data-page") === APP.page));
  const t = APP.titles[APP.page] || APP.titles.perfil;
  setText("tituloPagina", t[0]);
  setText("subtituloPagina", t[1]);
  if (APP.viewCache[APP.page]) {
    setHtml("conteudo", APP.viewCache[APP.page]);
    esconderLoading();
    carregarDadosModulo(APP.page);
    return;
  }
  mostrarLoading("Carregando " + t[0] + "...");
  google.script.run.withSuccessHandler(html => {
    APP.viewCache[APP.page] = html || "";
    setHtml("conteudo", APP.viewCache[APP.page]);
    esconderLoading();
    carregarDadosModulo(APP.page);
  }).withFailureHandler(erroPortal).carregarView(APP.page);
}

function carregarDadosModulo(page, force) {
  if (APP.dataCache[page] && !force) {
    renderizarModuloSeguro(page);
    return;
  }
  const calls = {
    perfil: "carregarResumoPerfil",
    patologias: "carregarPatologias",
    afastamentos: "carregarAfastamentos",
    vacinas: "carregarVacinas",
    exames: "carregarExames",
    seguimento: "carregarTratativasAcidentes",
    acidentes: "carregarAcidentes"
  };
  const fn = calls[page];
  if (!fn) return;
  mostrarLoading("Carregando dados...");
  const runner = google.script.run.withSuccessHandler(ret => {
    APP.dataCache[page] = ret || {};
    esconderLoading();
    renderizarModuloSeguro(page);
  }).withFailureHandler(erroPortal);
  chamarBackendModulo(runner, fn);
}

function chamarBackendModulo(runner, fn) {
  if (fn === "carregarResumoPerfil") return runner.carregarResumoPerfil();
  if (fn === "carregarPatologias") return runner.carregarPatologias();
  if (fn === "carregarAfastamentos") return runner.carregarAfastamentos();
  if (fn === "carregarVacinas") return runner.carregarVacinas();
  if (fn === "carregarExames") return runner.carregarExames();
  if (fn === "carregarTratativasAcidentes") return runner.carregarTratativasAcidentes();
  if (fn === "carregarAcidentes") return runner.carregarAcidentes();
  throw new Error("Função de backend não mapeada: " + fn);
}

function recarregarPaginaAtual() {
  delete APP.dataCache[APP.page];
  carregarDadosModulo(APP.page, true);
}

function renderizarModuloSeguro(page) {
  try {
    renderizarModulo(page);
  } catch (erro) {
    esconderLoading();
    mostrarErroRenderizacao(page, erro, APP.dataCache[page]);
  }
}

function renderizarModulo(page) {
  setText("atualizadoEm", "Atualizado em " + ((APP.dataCache[page] || {}).updatedAt || (APP.config || {}).updatedAt || "-"));
  if (page === "perfil") renderPerfilSaude();
  if (page === "patologias") renderPatologias();
  if (page === "afastamentos") renderAfastamentos();
  if (page === "vacinas") renderVacinas();
  if (page === "exames") renderExames();
  if (page === "seguimento") renderSeguimento();
  if (page === "acidentes") renderAcidentes();
}

function mostrarErroRenderizacao(page, erro, dados) {
  const msg = erro && erro.message ? erro.message : String(erro || "Erro desconhecido");
  const stack = erro && erro.stack ? erro.stack : "";
  const resumo = resumoDadosModulo(dados || {});
  const html = '<div class="empty error-box"><b>Erro ao desenhar este módulo</b><br>' +
    esc(msg) + (stack ? '<pre>' + esc(stack) + '</pre>' : '') +
    '<small>' + esc(resumo) + '</small></div>';
  const alvoFiltros = document.getElementById(page + "Filtros");
  const alvoCards = document.getElementById(page + "Cards");
  if (alvoFiltros) alvoFiltros.innerHTML = html;
  if (alvoCards) alvoCards.innerHTML = "";
  if (!alvoFiltros) setHtml("conteudo", html);
}

function resumoDadosModulo(dados) {
  const partes = [];
  if (dados.registros) partes.push("registros=" + dados.registros.length);
  if (dados.colaboradores) partes.push("colaboradores=" + dados.colaboradores.length);
  if (dados.totalRegistros) partes.push("totalRegistros=" + dados.totalRegistros);
  if (dados.retornoLimitado) partes.push("retornoLimitado=true");
  if (dados.origem && dados.origem.aba) partes.push("origem=" + dados.origem.aba + " linhas=" + (dados.origem.linhasLidas || 0));
  return partes.join(" | ") || "Sem resumo de dados recebido.";
}

function renderFiltros(module, data, extras) {
  const op = data.opcoes || {};
  const html = '<div class="filter-row">' +
    filtroMulti(module, "setor", "Setor", op.setores || [], true) +
    filtroMulti(module, "funcao", "Função", op.funcoes || [], true) +
    filtroMultiStatus(module, op.status || ((APP.config || {}).statusOptions || [])) +
    filtroMulti(module, "sexo", "Sexo", op.sexos || [], true) +
    filtroSelect(module, "ano", "Ano", extras && extras.anos, "Todos") +
    filtroSelect(module, "situacao", extras && extras.situacoes, "Todas") +
    '<button class="btn-secondary" onclick="limparFiltros(\'' + module + '\')">Limpar filtros</button>' +
    '<div class="filter-group"><label>Pesquisa</label><input class="filter-input" id="' + module + '_busca" placeholder="Nome ou matrícula" oninput="debouncedRender(\'' + module + '\')"></div>' +
  '</div>';
  setHtml(module + "Filtros", html);
  ["setor", "funcao", "status", "sexo"].forEach(t => atualizarTextoMulti(module, t));
}

function renderFiltrosPerfil(data) {
  const op = data.opcoes || {};
  const html = '<div class="filter-row perfil-filter-row">' +
    filtroMulti("perfil", "setor", "Setor", op.setores || [], true) +
    filtroMulti("perfil", "funcao", "Função", op.funcoes || [], true) +
    filtroMultiStatus("perfil", op.status || ((APP.config || {}).statusOptions || [])) +
    filtroSelect("perfil", "ano", "Ano", data.anos || [], "Todos") +
    '<button class="btn-secondary" onclick="limparFiltros(\'perfil\')">Limpar filtros</button>' +
  '</div>';
  setHtml("perfilFiltros", html);
  ["setor", "funcao", "status"].forEach(t => atualizarTextoMulti("perfil", t));
}

function filtroMulti(module, type, label, options, checked) {
  options = listaOpcoes(options);
  return '<div class="filter-group"><label>' + esc(label) + '</label><button type="button" class="multi-btn" id="' + module + '_' + type + '_btn" onclick="toggleMulti(\'' + module + '\',\'' + type + '\')"><span>Todos selecionados</span><b>▾</b></button><div class="multi-panel" id="' + module + '_' + type + '_panel">' +
    '<input class="multi-search" placeholder="Pesquisar" oninput="filtrarMulti(\'' + module + '\',\'' + type + '\',this.value)"><div class="multi-actions"><button onclick="marcarMulti(\'' + module + '\',\'' + type + '\',true)" type="button">Todos</button><button onclick="marcarMulti(\'' + module + '\',\'' + type + '\',false)" type="button">Limpar</button></div>' +
    (options || []).map(v => rowCheck(module, type, v, checked)).join("") + '</div></div>';
}

function filtroMultiStatus(module, options) {
  options = listaOpcoes(options);
  return '<div class="filter-group"><label>Status do colaborador</label><button type="button" class="multi-btn" id="' + module + '_status_btn" onclick="toggleMulti(\'' + module + '\',\'status\')"><span>Status padrão</span><b>▾</b></button><div class="multi-panel" id="' + module + '_status_panel">' +
    '<input class="multi-search" placeholder="Pesquisar status" oninput="filtrarMulti(\'' + module + '\',\'status\',this.value)"><div class="multi-actions"><button onclick="statusPadrao(\'' + module + '\')" type="button">Padrão</button><button onclick="marcarMulti(\'' + module + '\',\'status\',true)" type="button">Todos</button><button onclick="marcarMulti(\'' + module + '\',\'status\',false)" type="button">Limpar</button></div>' +
    (options || []).map(o => rowCheck(module, "status", o.nome || o, !!o.selected)).join("") + '</div></div>';
}

function rowCheck(module, type, value, checked) {
  return '<label class="check-row" data-text="' + escAttr(norm(value)) + '"><input type="checkbox" value="' + escAttr(value) + '"' + (checked ? " checked" : "") + ' onchange="aplicarFiltros(\'' + module + '\')"><span>' + esc(value) + '</span></label>';
}

function filtroSelect(module, type, label, options, first) {
  const lista = listaOpcoes(options);
  return '<div class="filter-group"><label>' + esc(label) + '</label><select class="filter-input" id="' + module + '_' + type + '" onchange="aplicarFiltros(\'' + module + '\')"><option value="">' + esc(first || "Todos") + '</option>' + lista.map(v => '<option value="' + escAttr(v) + '">' + esc(v) + '</option>').join("") + '</select></div>';
}

function listaOpcoes(options) {
  if (!options) return [];
  if (Array.isArray(options)) return options;
  if (typeof options === "object") return Object.keys(options).sort();
  return [String(options)];
}

function toggleMulti(module, type) {
  document.querySelectorAll(".multi-panel").forEach(p => {
    if (p.id !== module + "_" + type + "_panel") p.classList.remove("open");
  });
  const panel = document.getElementById(module + "_" + type + "_panel");
  if (panel) panel.classList.toggle("open");
}

function fecharFiltrosAoClicarFora(event) {
  const alvo = event && event.target;
  if (alvo && alvo.closest && alvo.closest(".filter-group")) return;
  document.querySelectorAll(".multi-panel.open").forEach(p => p.classList.remove("open"));
}

function filtrarMulti(module, type, value) {
  const panel = document.getElementById(module + "_" + type + "_panel");
  const q = norm(value);
  if (!panel) return;
  panel.querySelectorAll(".check-row").forEach(row => row.style.display = !q || (row.getAttribute("data-text") || "").indexOf(q) !== -1 ? "flex" : "none");
}

function marcarMulti(module, type, checked) {
  const panel = document.getElementById(module + "_" + type + "_panel");
  if (!panel) return;
  panel.querySelectorAll("input[type='checkbox']").forEach(i => { if (i.closest(".check-row").style.display !== "none") i.checked = checked; });
  atualizarTextoMulti(module, type);
  aplicarFiltros(module);
}

function statusPadrao(module) {
  const defaults = (((APP.dataCache[module] || {}).opcoes || {}).status || (APP.config || {}).statusOptions || []);
  const selected = {};
  defaults.forEach(o => { selected[o.nome || o] = !!o.selected; });
  const panel = document.getElementById(module + "_status_panel");
  if (!panel) return;
  panel.querySelectorAll("input[type='checkbox']").forEach(i => i.checked = selected[i.value] !== false);
  atualizarTextoMulti(module, "status");
  aplicarFiltros(module);
}

function selecionados(module, type) {
  const panel = document.getElementById(module + "_" + type + "_panel");
  if (!panel) return [];
  return Array.from(panel.querySelectorAll("input[type='checkbox']:checked")).map(i => i.value);
}

function atualizarTextoMulti(module, type) {
  const btn = document.querySelector("#" + module + "_" + type + "_btn span");
  const panel = document.getElementById(module + "_" + type + "_panel");
  if (!btn || !panel) return;
  const all = Array.from(panel.querySelectorAll("input[type='checkbox']"));
  const sel = all.filter(i => i.checked);
  if (!sel.length) btn.textContent = "Nenhum selecionado";
  else if (sel.length === all.length) btn.textContent = "Todos selecionados";
  else if (sel.length === 1) btn.textContent = sel[0].value;
  else btn.textContent = sel.length + " selecionados";
}

function limparFiltros(module) {
  ["setor", "funcao", "sexo"].forEach(t => marcarMultiSemRender(module, t, true));
  statusPadrao(module);
  ["ano", "situacao"].forEach(t => { const el = document.getElementById(module + "_" + t); if (el) el.value = ""; });
  const busca = document.getElementById(module + "_busca");
  if (busca) busca.value = "";
  aplicarFiltros(module);
}

function marcarMultiSemRender(module, type, checked) {
  const panel = document.getElementById(module + "_" + type + "_panel");
  if (!panel) return;
  panel.querySelectorAll("input[type='checkbox']").forEach(i => i.checked = checked);
  atualizarTextoMulti(module, type);
}

let debounceTimer = null;
function debouncedRender(module) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => aplicarFiltros(module), 220);
}

function aplicarFiltros(module) {
  ["setor", "funcao", "status", "sexo"].forEach(t => atualizarTextoMulti(module, t));
  APP.pageIndex[module] = 0;
  renderizarModulo(module);
}

function filtroComum(module, rows) {
  const set = selecionados(module, "setor");
  const fun = selecionados(module, "funcao");
  const sta = selecionados(module, "status");
  const sex = selecionados(module, "sexo");
  const ano = getValue(module + "_ano");
  const sit = getValue(module + "_situacao");
  const busca = norm(getValue(module + "_busca"));
  return (rows || []).filter(r => {
    if (set.length && set.indexOf(r.setor) === -1) return false;
    if (fun.length && fun.indexOf(r.funcao) === -1) return false;
    if (sta.length && sta.indexOf(r.status) === -1) return false;
    if (sex.length && sex.indexOf(r.sexo) === -1) return false;
    if (ano && String(r.ano || "") !== String(ano)) return false;
    if (sit && norm(r.situacaoVacinal || r.statusEtapa || "") !== norm(sit)) return false;
    if (busca && (norm(r.nome).indexOf(busca) === -1 && norm(r.mat).indexOf(busca) === -1)) return false;
    return true;
  });
}

function renderPerfilSaude() {
  const data = APP.dataCache.perfil || {};
  if (!document.getElementById("perfilFiltros")) return;
  if (!document.getElementById("perfil_setor_btn")) renderFiltrosPerfil(data);

  const rows = filtroPerfilColaboradores(data.colaboradores || []);
  const rowsDemografia = filtroPerfilColaboradores(data.colaboradores || [], true);
  const ano = getValue("perfil_ano");
  const rowsTotal = rowsDemografia.filter(r => !statusForaTotalPerfil(r.status));
  const rowsAtivos = rowsDemografia.filter(r => statusAtivoPerfil(r.status));
  const homens = rowsTotal.filter(r => r.sexo === "Masculino");
  const homensAtivos = rowsAtivos.filter(r => r.sexo === "Masculino");
  const mulheres = rowsTotal.filter(r => r.sexo === "Feminino");
  const mulheresAtivas = rowsAtivos.filter(r => r.sexo === "Feminino");
  const withPat = rows.filter(r => (r.cids || []).length).length;
  const totalCids = sum(rows, r => (r.cids || []).length);
  const eventosAfast = ((data.eventos || {}).afastamentos || []).filter(e => !ano || String(e.ano || "") === String(ano));
  const pendVac = rows.filter(r => (r.vacPendencias || []).length);
  const topCid = grupoCids(rows, "cids")[0];

  setHtml("perfilCards", [
    kpi("PS", "Colaboradores total", rowsTotal.length, "Total considerado"),
    kpi("AT", "Colaboradores ativos", rowsAtivos.length, "Ativo, reabilitado, gestante e licenca maternidade"),
    kpi("M", "Homens", homensAtivos.length, "Total: " + homens.length),
    kpi("F", "Mulheres", mulheresAtivas.length, "Total: " + mulheres.length)
  ].join(""));

  renderHabitBars("perfilAtividade", grupoHabitoPerfil(rows, "atividadeFisica"));
  renderHabitBars("perfilTabagismo", grupoHabitoPerfil(rows, "tabagismo"));
  renderHabitBars("perfilEtilismo", grupoHabitoPerfil(rows, "etilismo"));

  setHtml("perfilVacinasCards", [
    kpi("VC", "Cobertura geral", pct(rows.filter(r => r.vacCompleta).length, rows.length), rows.filter(r => r.vacCompleta).length + " de " + rows.length),
    kpi("OK", "Completos", rows.filter(r => r.vacCompleta).length, "Colaboradores"),
    kpi("!", "Pendentes", pendVac.length, "Com ao menos uma pendencia"),
    kpi("dT", "dT atualizada", pct(rows.filter(r => vacinaAtualizadaPerfil(r, "dt")).length, rows.length), "Por esquema dT"),
    kpi("HB", "Hepatite B atualizada", pct(rows.filter(r => vacinaAtualizadaPerfil(r, "hepB")).length, rows.length), "Por situacao Hep B"),
    kpi("CV", "Covid", pct(rows.filter(r => vacinaAtualizadaPerfil(r, "covid")).length, rows.length), "Por situacao COVID")
  ].join(""));
  renderBars("perfilVacinasAno", vacinasAplicadasPorAno(rows, ano), 2);
  renderBars("perfilVacinasPendencias", grupoPendenciasVacPerfil(rows), 8);
  renderBars("perfilVacinasSetor", grupoPendenciasVacSetorTipo(rows), 15);

  setHtml("perfilPatologiasCards", [
    kpi("CID", "Com patologia", withPat, rows.length - withPat + " sem patologia"),
    kpi("S", "Total de CIDs", totalCids, "Ocorrencias registradas"),
    kpi("TOP", "CID mais prevalente", topCid ? topCid.nome : "-", topCid ? topCid.quantidade + " registros" : "Sem CID")
  ].join(""));
  renderBars("perfilFamilias", grupoCids(rows, "familiasCid"), 12);
  renderBars("perfilTopCids", grupoCids(rows, "cids"), 10);
  renderBars("perfilPatologiasSetor", group(rows.filter(r => (r.cids || []).length), "setor"), 15);
  renderComboChart("perfilPatAfFamilia", cruzarPatologiasAfastamentosFamilia(rows, eventosAfast), 12);
  renderComboChart("perfilPatAfCids", cruzarPatologiasAfastamentosCid(rows, eventosAfast), 10);
}

function filtroPerfilColaboradores(rows, ignorarStatus) {
  const set = selecionados("perfil", "setor");
  const fun = selecionados("perfil", "funcao");
  const sta = selecionados("perfil", "status");
  return (rows || []).filter(r => {
    if (set.length && set.indexOf(r.setor) === -1) return false;
    if (fun.length && fun.indexOf(r.funcao) === -1) return false;
    if (!ignorarStatus && sta.length && sta.indexOf(r.status) === -1) return false;
    return true;
  });
}

function statusForaTotalPerfil(status) {
  const s = norm(status);
  return s.indexOf("DESLIG") !== -1 || s.indexOf("OBITO") !== -1 || s.indexOf("TRANSFER") !== -1;
}

function statusAtivoPerfil(status) {
  const s = norm(status);
  const semHifen = s.replace(/[-–—]/g, " ");
  return s === "ATIVO" || semHifen.indexOf("REABILITADO") !== -1 || semHifen.indexOf("GESTANTE") !== -1 || semHifen.indexOf("LICENCA MATERNIDADE") !== -1;
}

function vacinaAtualizadaPerfil(row, id) {
  const vac = (row.vacinas || {})[id] || {};
  return !!vac.completa;
}

function vacinasAplicadasPorAno(rows, anoFiltro) {
  const ano = String(anoFiltro || new Date().getFullYear());
  const ordem = ["dT", "Hepatite B"];
  const o = { "dT": 0, "Hepatite B": 0 };
  (rows || []).forEach(r => (r.vacinaEventos || []).forEach(e => {
    if (String(e.ano || "") !== ano) return;
    if (ordem.indexOf(e.tipo) === -1) return;
    if (o[e.tipo] === undefined) o[e.tipo] = 0;
    o[e.tipo] += 1;
  }));
  return ordem.map(k => ({ nome: k + " - " + ano, quantidade: o[k] || 0 }));
}

function grupoPendenciasVacPerfil(rows) {
  const o = {};
  (rows || []).forEach(r => (r.vacPendencias || []).forEach(p => { o[p] = (o[p] || 0) + 1; }));
  return Object.keys(o).map(k => ({ nome: k, quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade);
}

function grupoPendenciasVacSetorTipo(rows) {
  const setores = {};
  (rows || []).forEach(r => {
    (r.vacPendencias || []).forEach(p => {
      const setor = r.setor || "Nao informado";
      if (!setores[setor]) setores[setor] = { total: 0, tipos: {} };
      setores[setor].total += 1;
      setores[setor].tipos[p] = (setores[setor].tipos[p] || 0) + 1;
    });
  });
  return Object.keys(setores).map(setor => {
    const tipos = setores[setor].tipos;
    const detalhe = Object.keys(tipos).sort().map(k => k + ": " + tipos[k]).join(" | ");
    return { nome: setor, quantidade: setores[setor].total, detalhe };
  }).sort((a, b) => b.quantidade - a.quantidade || a.nome.localeCompare(b.nome));
}

function cruzarPatologiasAfastamentosFamilia(rows, eventos) {
  const familiasPat = grupoCids(rows, "familiasCid").map(r => ({
    familia: r.nome.split(" - ")[0],
    patologias: r.quantidade
  }));
  const afastPorFamilia = countBy(eventos.filter(e => e.familiaCid), "familiaCid");
  return familiasPat.map(item => ({
    nome: item.familia + " - " + descricaoCidPerfil(item.familia),
    patologias: item.patologias,
    afastamentos: afastPorFamilia[item.familia] || 0,
    detalhe: "Patologias: " + item.patologias + " | Afastamentos: " + (afastPorFamilia[item.familia] || 0)
  }));
}

function cruzarPatologiasAfastamentosCid(rows, eventos) {
  const top = grupoCids(rows, "cids").slice(0, 10);
  const afastPorCid = {};
  (eventos || []).forEach(e => {
    const cid = cidComparavel(e.cid);
    if (cid) afastPorCid[cid] = (afastPorCid[cid] || 0) + 1;
  });
  return top.map(item => ({
    nome: item.nome,
    patologias: item.quantidade,
    afastamentos: afastPorCid[cidComparavel(item.nome)] || 0,
    detalhe: "Patologias: " + item.quantidade + " | Afastamentos: " + (afastPorCid[cidComparavel(item.nome)] || 0)
  }));
}

function cidComparavel(cid) {
  const m = norm(cid).replace(/[^A-Z0-9]/g, "").match(/[A-Z][0-9]{2}/);
  return m ? m[0] : "";
}

function grupoHabitoPerfil(rows, key) {
  const nao = "N\u00c3O";
  const naoInformado = "N\u00c3O INFORMADO";
  const contagem = { "SIM": 0 };
  contagem[nao] = 0;
  contagem[naoInformado] = 0;
  (rows || []).forEach(r => {
    const v = norm(r[key]);
    let label = naoInformado;
    if (!v || v.indexOf("INFORMADO") !== -1 || v.indexOf("REGISTRO") !== -1) label = naoInformado;
    else if (v === "SIM" || v.indexOf("SIM") === 0) label = "SIM";
    else if (v === "NAO" || v === nao || v.indexOf("NAO") === 0 || v.indexOf(nao) === 0) label = nao;
    contagem[label] += 1;
  });
  return ["SIM", nao, naoInformado].map(nome => ({ nome, quantidade: contagem[nome] || 0 }));
}

function descricaoCidPerfil(f) {
  const map = {
    A:"Infecciosas", B:"Infecciosas", C:"Neoplasias", D:"Sangue/imunidade",
    E:"End\u00f3crinas", F:"Mentais", G:"Sistema nervoso", H:"Olhos/ouvidos",
    I:"Circulat\u00f3rio", J:"Respirat\u00f3rio", K:"Digestivo", L:"Pele",
    M:"Osteomuscular", N:"Geniturin\u00e1rio", O:"Gesta\u00e7\u00e3o", P:"Perinatal",
    Q:"Cong\u00eanitas", R:"Sintomas", S:"Les\u00f5es", T:"Les\u00f5es",
    U:"Especiais", V:"Externas", W:"Externas", X:"Externas", Y:"Externas",
    Z:"Fatores de sa\u00fade"
  };
  return map[f] || "N\u00e3o informado";
}

function grupoHabito(rows, key) {
  const contagem = { "SIM": 0, "NÃO": 0, "NÃO INFORMADO": 0 };
  (rows || []).forEach(r => {
    const v = norm(r[key]);
    let label = "NÃO INFORMADO";
    if (!v || v.indexOf("INFORMADO") !== -1 || v.indexOf("REGISTRO") !== -1) label = "NÃO INFORMADO";
    else if (v === "SIM" || v.indexOf("SIM") === 0) label = "SIM";
    else if (v === "NAO" || v === "NÃO" || v.indexOf("NAO") === 0 || v.indexOf("NÃO") === 0) label = "NÃO";
    contagem[label] += 1;
  });
  return ["SIM", "NÃO", "NÃO INFORMADO"].map(nome => ({ nome, quantidade: contagem[nome] || 0 }));
}

function renderTable(target, module, rows, cols) {
  const sorted = ordenar(module, rows || []);
  const pageSize = (APP.config && APP.config.pageSize) || 50;
  const page = APP.pageIndex[module] || 0;
  const totalPages = Math.max(Math.ceil(sorted.length / pageSize), 1);
  const start = Math.min(page, totalPages - 1) * pageSize;
  const current = sorted.slice(start, start + pageSize);
  const head = cols.map(c => '<th><button class="sort" onclick="ordenarPor(\'' + module + '\',\'' + c[0] + '\')">' + esc(c[1]) + setaSort(module, c[0]) + '</button></th>').join("");
  const body = current.map(r => '<tr>' + cols.map(c => '<td>' + esc(formatCell(r[c[0]])) + '</td>').join("") + '</tr>').join("");
  const html = '<div class="table-wrap"><table><thead><tr>' + head + '</tr></thead><tbody>' + (body || '<tr><td colspan="' + cols.length + '">Sem registros</td></tr>') + '</tbody></table></div>' +
    '<div class="pager"><span>Exibindo ' + (sorted.length ? start + 1 : 0) + '-' + Math.min(start + pageSize, sorted.length) + ' de ' + sorted.length + '</span><span><button class="btn-secondary" onclick="mudarPagina(\'' + module + '\',-1)">Anterior</button> <button class="btn-secondary" onclick="mudarPagina(\'' + module + '\',1)">PrÃ³xima</button></span></div>';
  setHtml(target, html);
}

function ordenarPor(module, key) {
  const s = APP.sort[module] || {};
  APP.sort[module] = { key, dir: s.key === key && s.dir === "asc" ? "desc" : "asc" };
  renderizarModulo(module);
}

function ordenar(module, rows) {
  const s = APP.sort[module];
  if (!s || !s.key) return rows;
  return rows.slice().sort((a, b) => {
    const av = formatCell(a[s.key]);
    const bv = formatCell(b[s.key]);
    return s.dir === "asc" ? av.localeCompare(bv, "pt-BR", { numeric: true }) : bv.localeCompare(av, "pt-BR", { numeric: true });
  });
}

function setaSort(module, key) {
  const s = APP.sort[module] || {};
  return s.key === key ? (s.dir === "asc" ? " ↑" : " ↓") : " ↕";
}

function mudarPagina(module, delta) {
  APP.pageIndex[module] = Math.max(0, (APP.pageIndex[module] || 0) + delta);
  renderizarModulo(module);
}

function baixarCsv(nome, linhas) {
  const csv = linhas.map(row => row.map(v => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"').join(";")).join("\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nome; a.click();
  URL.revokeObjectURL(url);
}

function renderBars(id, rows, limit) {
  const list = (rows || []).slice(0, limit || 15);
  if (!list.length) { setHtml(id, '<div class="empty">Sem dados</div>'); return; }
  const max = Math.max.apply(null, list.map(r => Number(r.quantidade || 0))) || 1;
  setHtml(id, '<div class="bar-list">' + list.map(r => {
    const w = Math.max((Number(r.quantidade || 0) / max) * 100, 2);
    const title = escAttr(r.detalhe ? r.nome + " | " + r.detalhe : r.nome);
    return '<div class="bar-row" title="' + title + '"><div class="bar-label" title="' + title + '">' + esc(r.nome) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%"></div></div><div class="bar-value">' + fmt(r.quantidade) + '</div></div>';
  }).join("") + '</div>');
}

function renderComboChart(id, rows, limit) {
  const list = (rows || []).slice(0, limit || 12);
  if (!list.length) { setHtml(id, '<div class="empty">Sem dados</div>'); return; }
  const max = Math.max.apply(null, list.map(r => Math.max(Number(r.patologias || 0), Number(r.afastamentos || 0)))) || 1;
  const maxLabel = fmt(max);
  const points = list.map((r, i) => {
    const x = ((i + 0.5) / list.length) * 100;
    const y = Math.max(0, Math.min(100, 100 - ((Number(r.afastamentos || 0) / max) * 100)));
    return x.toFixed(2) + "," + y.toFixed(2);
  }).join(" ");
  const lineSvg = '<svg class="combo-line" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"><polyline points="' + points + '" fill="none" stroke="#2d64ad" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>';
  const chart = list.map(r => {
    const pat = Number(r.patologias || 0);
    const af = Number(r.afastamentos || 0);
    const barH = Math.max((pat / max) * 100, pat ? 2 : 0);
    const dotY = Math.max(0, Math.min(100, 100 - ((af / max) * 100)));
    const title = escAttr((r.detalhe || ("Patologias: " + pat + " | Afastamentos: " + af)));
    return '<div class="combo-item" title="' + title + '">' +
      '<div class="combo-plot">' +
        '<div class="combo-bar-value" style="bottom:calc(' + barH + '% + 8px)">' + fmt(pat) + '</div>' +
        '<div class="combo-bar" style="height:' + barH + '%"></div>' +
        '<div class="combo-dot" style="top:' + dotY + '%"></div>' +
        '<div class="combo-dot-value" style="top:' + dotY + '%">' + fmt(af) + '</div>' +
      '</div>' +
      '<div class="combo-label" title="' + escAttr(r.nome) + '">' + esc(r.nome) + '</div>' +
    '</div>';
  }).join("");
  setHtml(id, '<div class="combo-head"><div class="combo-legend"><span><i class="bar"></i>Patologias</span><span><i class="line"></i>Afastamentos</span></div><span class="combo-scale">Escala m&aacute;xima: ' + esc(maxLabel) + '</span></div><div class="combo-chart" style="--cols:' + list.length + '">' + lineSvg + chart + '</div>');
}

function group(rows, key) {
  const o = {};
  (rows || []).forEach(r => { const k = r[key] || "Não informado"; o[k] = (o[k] || 0) + 1; });
  return Object.keys(o).map(k => ({ nome: k, quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade || a.nome.localeCompare(b.nome));
}

function countBy(rows, key) {
  const o = {};
  (rows || []).forEach(r => { const k = r[key] || "Não informado"; o[k] = (o[k] || 0) + 1; });
  return o;
}

function grupoCids(rows, prop) {
  const o = {};
  (rows || []).forEach(r => (r[prop] || []).forEach(c => { const nome = prop === "familiasCid" ? c + " - " + descricaoCidPerfil(c) : c; o[nome] = (o[nome] || 0) + 1; }));
  return Object.keys(o).map(k => ({ nome: k, quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade);
}

function grupoPendenciasVac(rows) {
  const o = {};
  (rows || []).forEach(r => (r.pendencias || []).forEach(p => { o[p] = (o[p] || 0) + 1; }));
  return Object.keys(o).map(k => ({ nome: k, quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade);
}

function grupoPendenciasExames(rows) {
  const o = {};
  (rows || []).forEach(r => (r.exames || []).forEach(e => { if (e.pendente) o[e.nome] = (o[e.nome] || 0) + 1; }));
  return Object.keys(o).map(k => ({ nome: k, quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade);
}

function cruzarPatAf(rows, eventos) {
  const allowed = {};
  rows.forEach(r => { allowed[r.key] = r.familiasCid || []; });
  const o = {};
  (eventos || []).forEach(e => {
    if (!allowed[e.key]) return;
    const f = e.familiaCid || "Não informado";
    o[f] = (o[f] || 0) + 1;
  });
  return Object.keys(o).map(k => ({ nome: k + " - " + descricaoCid(k), quantidade: o[k] })).sort((a, b) => b.quantidade - a.quantidade);
}

function grupoHabitos(rows) {
  return group(rows.map(r => ({ nome: "Atividade: " + (r.atividadeFisica || "Não informado") })), "nome")
    .concat(group(rows.map(r => ({ nome: "Tabagismo: " + (r.tabagismo || "Não informado") })), "nome"))
    .concat(group(rows.map(r => ({ nome: "Vacina: " + (r.vacCompleta ? "Completa" : "Pendente") })), "nome"));
}

function meses(rows) {
  const nomes = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const o = {};
  (rows || []).forEach(r => { if (r.mes) o[r.mes] = (o[r.mes] || 0) + 1; });
  return nomes.map((n, i) => ({ nome: n, quantidade: o[i + 1] || 0 }));
}

function distinct(rows, key) {
  const o = {};
  (rows || []).forEach(r => { if (r[key]) o[r[key]] = true; });
  return Object.keys(o);
}

function sum(rows, fn) { return (rows || []).reduce((acc, r) => acc + Number(fn(r) || 0), 0); }
function media(total, qtd) { return qtd ? (total / qtd).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) : "0"; }
function pct(num, den) { return den ? ((num / den) * 100).toLocaleString("pt-BR", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + "%" : "0,0%"; }
function fmt(v) { return Number(v || 0).toLocaleString("pt-BR"); }
function formatCell(v) { return Array.isArray(v) ? v.join(", ") : (v == null ? "" : String(v)); }
function norm(v) { return String(v == null ? "" : v).trim().replace(/\s+/g, " ").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase(); }
function esc(v) { return String(v == null ? "" : v).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c])); }
function escAttr(v) { return esc(v).replace(/'/g, "&#039;"); }
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value == null ? "" : String(value); }
function setHtml(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }
function getValue(id) { const el = document.getElementById(id); return el ? el.value : ""; }
function mostrarLoading(txt) { setText("loadingText", txt || "Carregando..."); document.getElementById("loading").classList.remove("hidden"); document.getElementById("conteudo").classList.add("hidden"); }
function esconderLoading() { document.getElementById("loading").classList.add("hidden"); document.getElementById("conteudo").classList.remove("hidden"); }
function erroPortal(erro) {
  esconderLoading();
  const msg = erro && erro.message ? erro.message : String(erro || "Erro desconhecido");
  const detalhe = norm(msg).indexOf("AUTH") !== -1 || norm(msg).indexOf("PERMISSION") !== -1 || norm(msg).indexOf("AUTORIZ") !== -1
    ? "Autorize o web app no Google ou ajuste a implantaÃ§Ã£o para executar como o proprietÃ¡rio."
    : "Abra o Registro de execuÃ§Ã£o no Apps Script para ver a falha exata do backend.";
  setHtml("conteudo", '<div class="empty"><b>Erro ao carregar dados</b><br>' + esc(msg) + '<br><span>' + esc(detalhe) + '</span></div>');
}
function descricaoCid(f) {
  const map = { A:"Infecciosas", B:"Infecciosas", C:"Neoplasias", D:"Sangue/imunidade", E:"Endócrinas", F:"Mentais", G:"Sistema nervoso", H:"Olhos/ouvidos", I:"Circulatório", J:"RespiratÃ³rio", K:"Digestivo", L:"Pele", M:"Osteomuscular", N:"Geniturinário", O:"Gestação", P:"Perinatal", Q:"Congênitas", R:"Sintomas", S:"Lesões", T:"Lesões", U:"Especiais", V:"Externas", W:"Externas", X:"Externas", Y:"Externas", Z:"Fatores de saúde" };
  return map[f] || "Não informado";
}
