<script>
const APP = {
  page: "perfil",
  viewCache: {},
  dataCache: {},
  config: null,
  sort: {},
  pageIndex: {},
  titles: {
    perfil: ["Perfil de Saúde", "Visão quantitativa consolidada"],
    patologias: ["Patologias", "Análise das patologias informadas"],
    afastamentos: ["Afastamentos", "Indicadores de afastamentos dos colaboradores"],
    vacinas: ["Vacinas", "Cobertura vacinal e acompanhamento de pendências"],
    exames: ["Exames Complementares", "Acompanhamento de exames ocupacionais"],
    seguimento: ["Seguimento de exames", "Tratativa dos exames de seguimento"],
    acidentes: ["Acidentes Mat. Biológico", "Indicadores dos acidentes com material biológico"]
  }
};

document.addEventListener("DOMContentLoaded", iniciarPortal);

function iniciarPortal() {
  document.querySelectorAll(".menu-item").forEach(function(btn) {
    btn.addEventListener("click", function() {
      trocarPagina(btn.getAttribute("data-page"));
    });
  });

  document.addEventListener("click", fecharFiltrosAoClicarFora);

  try {
    if (localStorage.getItem("perfilSaudeMenuRecolhido") === "1") {
      document.getElementById("app").classList.add("menu-recolhido");
    }
  } catch (e) {}

  atualizarBotaoMenuRecolhido();
  mostrarLoading("Carregando configurações...");

  google.script.run
    .withSuccessHandler(function(ret) {
      APP.config = ret || {};
      trocarPagina("perfil");
    })
    .withFailureHandler(function() {
      APP.config = configuracaoFallback();
      trocarPagina("perfil");
    })
    .carregarConfiguracoes();
}

function configuracaoFallback() {
  return {
    pageSize: 50,
    statusOptions: [
      { nome: "Ativo", selected: true },
      { nome: "Ativo - Reabilitado", selected: true },
      { nome: "Gestante", selected: true },
      { nome: "Desligado", selected: false },
      { nome: "Óbito", selected: false },
      { nome: "Transferido", selected: false },
      { nome: "Suspenso", selected: false },
      { nome: "Aposentado", selected: false },
      { nome: "Afastado pelo INSS", selected: false },
      { nome: "Licença-maternidade", selected: false },
      { nome: "Não informado", selected: false }
    ],
    updatedAt: "-"
  };
}

function alternarMenu() {
  const app = document.getElementById("app");
  if (!app) return;

  const recolhido = app.classList.toggle("menu-recolhido");

  try {
    localStorage.setItem("perfilSaudeMenuRecolhido", recolhido ? "1" : "0");
  } catch (e) {}

  atualizarBotaoMenuRecolhido();
}

function atualizarBotaoMenuRecolhido() {
  const app = document.getElementById("app");
  const btn = document.querySelector(".menu-collapse-btn");

  if (!app || !btn) return;

  const recolhido = app.classList.contains("menu-recolhido");
  const span = btn.querySelector("span");
  const text = btn.querySelector("b");

  if (span) span.textContent = recolhido ? "›" : "«";
  if (text) text.textContent = recolhido ? "Expandir menu" : "Recolher menu";

  btn.title = recolhido ? "Expandir menu" : "Recolher menu";
}

function trocarPagina(page) {
  APP.page = page || "perfil";

  document.querySelectorAll(".menu-item").forEach(function(btn) {
    btn.classList.toggle(
      "active",
      btn.getAttribute("data-page") === APP.page
    );
  });

  const titulo = APP.titles[APP.page] || APP.titles.perfil;

  setText("tituloPagina", titulo[0]);
  setText("subtituloPagina", titulo[1]);

  if (APP.viewCache[APP.page]) {
    setHtml("conteudo", APP.viewCache[APP.page]);
    esconderLoading();
    carregarDadosModulo(APP.page);
    return;
  }

  mostrarLoading("Carregando " + titulo[0] + "...");

  google.script.run
    .withSuccessHandler(function(html) {
      APP.viewCache[APP.page] = html || "";
      setHtml("conteudo", APP.viewCache[APP.page]);
      esconderLoading();
      carregarDadosModulo(APP.page);
    })
    .withFailureHandler(erroPortal)
    .carregarView(APP.page);
}

function carregarDadosModulo(page, force) {
  if (APP.dataCache[page] && !force) {
    renderizarModuloSeguro(page);
    return;
  }

  const calls = {
    perfil: "carregarResumoPerfil",
    patologias: "carregarPatologias",
    afastamentos: "carregarAfastamentos",
    vacinas: "carregarVacinas",
    exames: "carregarExames",
    seguimento: "carregarTratativasAcidentes",
    acidentes: "carregarAcidentes"
  };

  const fn = calls[page];

  if (!fn) return;

  mostrarLoading("Carregando dados...");

  const runner = google.script.run
    .withSuccessHandler(function(ret) {
      APP.dataCache[page] = ret || {};
      esconderLoading();
      renderizarModuloSeguro(page);
    })
    .withFailureHandler(erroPortal);

  chamarBackendModulo(runner, fn);
}

function chamarBackendModulo(runner, fn) {
  if (fn === "carregarResumoPerfil") return runner.carregarResumoPerfil();
  if (fn === "carregarPatologias") return runner.carregarPatologias();
  if (fn === "carregarAfastamentos") return runner.carregarAfastamentos();
  if (fn === "carregarVacinas") return runner.carregarVacinas();
  if (fn === "carregarExames") return runner.carregarExames();
  if (fn === "carregarTratativasAcidentes") return runner.carregarTratativasAcidentes();
  if (fn === "carregarAcidentes") return runner.carregarAcidentes();

  throw new Error("Função de backend não mapeada: " + fn);
}

function recarregarPaginaAtual() {
  delete APP.dataCache[APP.page];
  carregarDadosModulo(APP.page, true);
}

function renderizarModuloSeguro(page) {
  try {
    renderizarModulo(page);
  } catch (erro) {
    esconderLoading();
    mostrarErroRenderizacao(page, erro, APP.dataCache[page]);
  }
}

function renderizarModulo(page) {
  const dados = APP.dataCache[page] || {};
  const atualizado = dados.updatedAt || (APP.config || {}).updatedAt || "-";

  setText("atualizadoEm", "Atualizado em " + atualizado);

  if (page === "perfil") renderPerfilSaude();
  else if (page === "patologias") renderPatologias();
  else if (page === "afastamentos") renderAfastamentos();
  else if (page === "vacinas") renderVacinas();
  else if (page === "exames") renderExames();
  else if (page === "seguimento") renderSeguimento();
  else if (page === "acidentes") renderAcidentes();
}

function mostrarErroRenderizacao(page, erro, dados) {
  const msg = erro && erro.message ? erro.message : String(erro || "Erro desconhecido");
  const stack = erro && erro.stack ? erro.stack : "";
  const resumo = resumoDadosModulo(dados || {});

  const html =
    '<div class="empty error-box">' +
      "<b>Erro ao desenhar este módulo</b><br>" +
      esc(msg) +
      (stack ? "<pre>" + esc(stack) + "</pre>" : "") +
      "<small>" + esc(resumo) + "</small>" +
    "</div>";

  const alvoFiltros = document.getElementById(page + "Filtros");
  const alvoCards = document.getElementById(page + "Cards");

  if (alvoFiltros) alvoFiltros.innerHTML = html;
  if (alvoCards) alvoCards.innerHTML = "";
  if (!alvoFiltros) setHtml("conteudo", html);
}

function resumoDadosModulo(dados) {
  const partes = [];

  if (dados.registros) partes.push("registros=" + dados.registros.length);
  if (dados.colaboradores) partes.push("colaboradores=" + dados.colaboradores.length);
  if (dados.totalRegistros !== undefined) partes.push("totalRegistros=" + dados.totalRegistros);
  if (dados.retornoLimitado) partes.push("retornoLimitado=true");

  if (dados.origem && dados.origem.aba) {
    partes.push(
      "origem=" + dados.origem.aba +
      " linhas=" + (dados.origem.linhasLidas || 0)
    );
  }

  return partes.join(" | ") || "Sem resumo de dados recebido.";
}

/* =========================
   FILTROS
========================= */

function renderFiltros(module, data, extras) {
  const op = data.opcoes || {};
  const html =
    '<div class="filter-row">' +
      filtroMulti(module, "setor", "Setor", op.setores || [], true) +
      filtroMulti(module, "funcao", "Função", op.funcoes || [], true) +
      filtroMultiStatus(module, op.status || ((APP.config || {}).statusOptions || [])) +
      filtroMulti(module, "sexo", "Sexo", op.sexos || [], true) +
      filtroSelect(module, "ano", "Ano", extras && extras.anos, "Todos") +
      filtroSelect(module, "situacao", "Situação", extras && extras.situacoes, "Todas") +
      '<button class="btn-secondary" type="button" onclick="limparFiltros(\'' + module + '\')">Limpar filtros</button>' +
      '<div class="filter-group">' +
        "<label>Pesquisa</label>" +
        '<input class="filter-input" id="' + module + '_busca" placeholder="Nome ou matrícula" oninput="debouncedRender(\'' + module + '\')">' +
      "</div>" +
    "</div>";

  setHtml(module + "Filtros", html);

  ["setor", "funcao", "status", "sexo"].forEach(function(tipo) {
    atualizarTextoMulti(module, tipo);
  });
}

function renderFiltrosPerfil(data) {
  const op = data.opcoes || {};
  const html =
    '<div class="filter-row perfil-filter-row">' +
      filtroMulti("perfil", "setor", "Setor", op.setores || [], true) +
      filtroMulti("perfil", "funcao", "Função", op.funcoes || [], true) +
      filtroMultiStatus("perfil", op.status || ((APP.config || {}).statusOptions || [])) +
      filtroSelect("perfil", "ano", "Ano", data.anos || [], "Todos") +
      '<button class="btn-secondary" type="button" onclick="limparFiltros(\'perfil\')">Limpar filtros</button>' +
    "</div>";

  setHtml("perfilFiltros", html);

  ["setor", "funcao", "status"].forEach(function(tipo) {
    atualizarTextoMulti("perfil", tipo);
  });
}

function filtroMulti(module, type, label, options, checked) {
  const lista = listaOpcoes(options);

  return (
    '<div class="filter-group">' +
      "<label>" + esc(label) + "</label>" +
      '<button type="button" class="multi-btn" id="' + module + "_" + type + '_btn" onclick="toggleMulti(\'' + module + "','" + type + '\')">' +
        "<span>Todos selecionados</span><b>▾</b>" +
      "</button>" +
      '<div class="multi-panel" id="' + module + "_" + type + '_panel">' +
        '<input class="multi-search" placeholder="Pesquisar" oninput="filtrarMulti(\'' + module + "','" + type + '\',this.value)">' +
        '<div class="multi-actions">' +
          '<button type="button" onclick="marcarMulti(\'' + module + "','" + type + '\',true)">Todos</button>' +
          '<button type="button" onclick="marcarMulti(\'' + module + "','" + type + '\',false)">Limpar</button>' +
        "</div>" +
        lista.map(function(v) {
          return rowCheck(module, type, v, checked);
        }).join("") +
      "</div>" +
    "</div>"
  );
}

function filtroMultiStatus(module, options) {
  const lista = listaOpcoes(options);

  return (
    '<div class="filter-group">' +
      "<label>Status do colaborador</label>" +
      '<button type="button" class="multi-btn" id="' + module + '_status_btn" onclick="toggleMulti(\'' + module + "','status')\">" +
        "<span>Status padrão</span><b>▾</b>" +
      "</button>" +
      '<div class="multi-panel" id="' + module + '_status_panel">' +
        '<input class="multi-search" placeholder="Pesquisar status" oninput="filtrarMulti(\'' + module + "','status',this.value)\">" +
        '<div class="multi-actions">' +
          '<button type="button" onclick="statusPadrao(\'' + module + "')\">Padrão</button>" +
          '<button type="button" onclick="marcarMulti(\'' + module + "','status',true)\">Todos</button>" +
          '<button type="button" onclick="marcarMulti(\'' + module + "','status',false)\">Limpar</button>" +
        "</div>" +
        lista.map(function(o) {
          return rowCheck(module, "status", o.nome || o, !!o.selected);
        }).join("") +
      "</div>" +
    "</div>"
  );
}

function rowCheck(module, type, value, checked) {
  return (
    '<label class="check-row" data-text="' + escAttr(norm(value)) + '">' +
      '<input type="checkbox" value="' + escAttr(value) + '"' +
      (checked ? " checked" : "") +
      ' onchange="aplicarFiltros(\'' + module + "')\">" +
      "<span>" + esc(value) + "</span>" +
    "</label>"
  );
}

function filtroSelect(module, type, label, options, first) {
  const lista = listaOpcoes(options);

  return (
    '<div class="filter-group">' +
      "<label>" + esc(label) + "</label>" +
      '<select class="filter-input" id="' + module + "_" + type + '" onchange="aplicarFiltros(\'' + module + "')\">" +
        '<option value="">' + esc(first || "Todos") + "</option>" +
        lista.map(function(v) {
          return '<option value="' + escAttr(v) + '">' + esc(v) + "</option>";
        }).join("") +
      "</select>" +
    "</div>"
  );
}

function listaOpcoes(options) {
  if (!options) return [];
  if (Array.isArray(options)) return options;
  if (typeof options === "object") return Object.keys(options).sort();
  return [String(options)];
}

function toggleMulti(module, type) {
  document.querySelectorAll(".multi-panel").forEach(function(panel) {
    if (panel.id !== module + "_" + type + "_panel") {
      panel.classList.remove("open");
    }
  });

  const panel = document.getElementById(module + "_" + type + "_panel");

  if (panel) panel.classList.toggle("open");
}

function fecharFiltrosAoClicarFora(event) {
  const alvo = event && event.target;

  if (alvo && alvo.closest && alvo.closest(".filter-group")) return;

  document.querySelectorAll(".multi-panel.open").forEach(function(panel) {
    panel.classList.remove("open");
  });
}

function filtrarMulti(module, type, value) {
  const panel = document.getElementById(module + "_" + type + "_panel");
  const busca = norm(value);

  if (!panel) return;

  panel.querySelectorAll(".check-row").forEach(function(row) {
    const texto = row.getAttribute("data-text") || "";
    row.style.display = !busca || texto.indexOf(busca) !== -1 ? "flex" : "none";
  });
}

function marcarMulti(module, type, checked) {
  const panel = document.getElementById(module + "_" + type + "_panel");

  if (!panel) return;

  panel.querySelectorAll("input[type='checkbox']").forEach(function(input) {
    const linha = input.closest(".check-row");

    if (!linha || linha.style.display !== "none") {
      input.checked = checked;
    }
  });

  atualizarTextoMulti(module, type);
  aplicarFiltros(module);
}

function statusPadrao(module) {
  const defaults =
    (((APP.dataCache[module] || {}).opcoes || {}).status) ||
    (APP.config || {}).statusOptions ||
    [];

  const selecionadosPadrao = {};

  defaults.forEach(function(item) {
    selecionadosPadrao[item.nome || item] = !!item.selected;
  });

  const panel = document.getElementById(module + "_status_panel");

  if (!panel) return;

  panel.querySelectorAll("input[type='checkbox']").forEach(function(input) {
    input.checked = selecionadosPadrao[input.value] === true;
  });

  atualizarTextoMulti(module, "status");
}

function selecionados(module, type) {
  const panel = document.getElementById(module + "_" + type + "_panel");

  if (!panel) return [];

  return Array.from(
    panel.querySelectorAll("input[type='checkbox']:checked")
  ).map(function(input) {
    return input.value;
  });
}

function atualizarTextoMulti(module, type) {
  const btn = document.querySelector("#" + module + "_" + type + "_btn span");
  const panel = document.getElementById(module + "_" + type + "_panel");

  if (!btn || !panel) return;

  const todos = Array.from(panel.querySelectorAll("input[type='checkbox']"));
  const sel = todos.filter(function(input) {
    return input.checked;
  });

  if (!sel.length) btn.textContent = "Nenhum selecionado";
  else if (sel.length === todos.length) btn.textContent = "Todos selecionados";
  else if (sel.length === 1) btn.textContent = sel[0].value;
  else btn.textContent = sel.length + " selecionados";
}

function limparFiltros(module) {
  ["setor", "funcao", "sexo"].forEach(function(tipo) {
    marcarMultiSemRender(module, tipo, true);
  });

  statusPadrao(module);

  ["ano", "situacao"].forEach(function(tipo) {
    const el = document.getElementById(module + "_" + tipo);
    if (el) el.value = "";
  });

  const busca = document.getElementById(module + "_busca");

  if (busca) busca.value = "";

  aplicarFiltros(module);
}

function marcarMultiSemRender(module, type, checked) {
  const panel = document.getElementById(module + "_" + type + "_panel");

  if (!panel) return;

  panel.querySelectorAll("input[type='checkbox']").forEach(function(input) {
    input.checked = checked;
  });

  atualizarTextoMulti(module, type);
}

let debounceTimer = null;

function debouncedRender(module) {
  clearTimeout(debounceTimer);

  debounceTimer = setTimeout(function() {
    aplicarFiltros(module);
  }, 220);
}

function aplicarFiltros(module) {
  ["setor", "funcao", "status", "sexo"].forEach(function(tipo) {
    atualizarTextoMulti(module, tipo);
  });

  APP.pageIndex[module] = 0;
  renderizarModulo(module);
}

function filtroComum(module, rows) {
  const setores = selecionados(module, "setor");
  const funcoes = selecionados(module, "funcao");
  const status = selecionados(module, "status");
  const sexos = selecionados(module, "sexo");
  const ano = getValue(module + "_ano");
  const situacao = getValue(module + "_situacao");
  const busca = norm(getValue(module + "_busca"));

  return (rows || []).filter(function(r) {
    if (setores.length && setores.indexOf(r.setor) === -1) return false;
    if (funcoes.length && funcoes.indexOf(r.funcao) === -1) return false;
    if (status.length && status.indexOf(r.status) === -1) return false;
    if (sexos.length && sexos.indexOf(r.sexo) === -1) return false;
    if (ano && String(r.ano || "") !== String(ano)) return false;

    if (
      situacao &&
      norm(r.situacaoVacinal || r.statusEtapa || r.status || "") !== norm(situacao)
    ) {
      return false;
    }

    if (
      busca &&
      norm(r.nome).indexOf(busca) === -1 &&
      norm(r.mat).indexOf(busca) === -1
    ) {
      return false;
    }

    return true;
  });
}

/* =========================
   PERFIL
========================= */

function renderPerfilSaude() {
  const data = APP.dataCache.perfil || {};

  if (!document.getElementById("perfilFiltros")) return;

  if (!document.getElementById("perfil_setor_btn")) {
    renderFiltrosPerfil(data);
  }

  const rows = filtroPerfilColaboradores(data.colaboradores || []);
  const ano = getValue("perfil_ano");

  const rowsAtivos = rows.filter(function(r) {
    return statusAtivoPerfil(r.status);
  });

  const homens = rows.filter(function(r) {
    return r.sexo === "Masculino";
  });

  const mulheres = rows.filter(function(r) {
    return r.sexo === "Feminino";
  });

  const withPat = rows.filter(function(r) {
    return (r.cids || []).length > 0;
  }).length;

  const totalCids = sum(rows, function(r) {
    return (r.cids || []).length;
  });

  const eventosAfast = ((data.eventos || {}).afastamentos || []).filter(function(e) {
    return !ano || String(e.ano || "") === String(ano);
  });

  const topCid = grupoCids(rows, "cids")[0];

  setHtml("perfilCards", [
    kpi("PS", "Colaboradores no filtro", rows.length, "Conforme filtros selecionados"),
    kpi("AT", "Colaboradores ativos", rowsAtivos.length, "Subconjunto do filtro atual"),
    kpi("M", "Homens", homens.length, pct(homens.length, rows.length) + " do filtro"),
    kpi("F", "Mulheres", mulheres.length, pct(mulheres.length, rows.length) + " do filtro")
  ].join(""));

  renderHabitBars("perfilAtividade", grupoHabitoPerfil(rows, "atividadeFisica"));
  renderHabitBars("perfilTabagismo", grupoHabitoPerfil(rows, "tabagismo"));
  renderHabitBars("perfilEtilismo", grupoHabitoPerfil(rows, "etilismo"));

  const vacCompletas = rows.filter(function(r) {
    return r.vacCompleta;
  }).length;

  const vacPendentes = rows.filter(function(r) {
    return !r.vacCompleta;
  }).length;

  setHtml("perfilVacinasCards", [
    kpi("VC", "Vacinas atualizadas", pct(vacCompletas, rows.length), vacCompletas + " de " + rows.length),
    kpi("OK", "Atualizadas", vacCompletas, "Conforme coluna D"),
    kpi("!", "Pendência vacinal", vacPendentes, "Conforme coluna D"),
    kpi("dT", "dT completa", pct(rows.filter(function(r) { return vacinaAtualizadaPerfil(r, "dt"); }).length, rows.length), "Coluna K"),
    kpi("HB", "Hepatite B completa", pct(rows.filter(function(r) { return vacinaAtualizadaPerfil(r, "hepB"); }).length, rows.length), "Coluna R"),
    kpi("CV", "COVID vacinado(a)", pct(rows.filter(function(r) { return vacinaAtualizadaPerfil(r, "covid"); }).length, rows.length), "Coluna AA")
  ].join(""));

  renderBars("perfilVacinasAno", vacinasAplicadasPorAno(rows, ano), 3);
  renderBars("perfilVacinasPendencias", grupoPendenciasVacPerfil(rows), 3);
  renderBars("perfilVacinasSetor", grupoPendenciasVacSetorTipo(rows), 15);

  setHtml("perfilPatologiasCards", [
    kpi("CID", "Com patologia", withPat, (rows.length - withPat) + " sem patologia"),
    kpi("S", "Total de CIDs", totalCids, "Ocorrências registradas"),
    kpi("TOP", "CID mais prevalente", topCid ? topCid.nome : "-", topCid ? topCid.quantidade + " registros" : "Sem CID")
  ].join(""));

  renderBars("perfilFamilias", grupoCids(rows, "familiasCid"), 12);
  renderBars("perfilTopCids", grupoCids(rows, "cids"), 10);
  renderBars("perfilPatologiasSetor", group(rows.filter(function(r) { return (r.cids || []).length; }), "setor"), 15);

  renderComboChart(
    "perfilPatAfFamilia",
    cruzarPatologiasAfastamentosFamilia(rows, eventosAfast),
    12
  );

  renderComboChart(
    "perfilPatAfCids",
    cruzarPatologiasAfastamentosCid(rows, eventosAfast),
    10
  );
}

function filtroPerfilColaboradores(rows) {
  const setores = selecionados("perfil", "setor");
  const funcoes = selecionados("perfil", "funcao");
  const status = selecionados("perfil", "status");

  return (rows || []).filter(function(r) {
    if (setores.length && setores.indexOf(r.setor) === -1) return false;
    if (funcoes.length && funcoes.indexOf(r.funcao) === -1) return false;
    if (status.length && status.indexOf(r.status) === -1) return false;
    return true;
  });
}

function statusAtivoPerfil(status) {
  const s = norm(status).replace(/[-–—]/g, " ");

  return (
    s === "ATIVO" ||
    s.indexOf("REABILITADO") !== -1 ||
    s.indexOf("GESTANTE") !== -1 ||
    s.indexOf("LICENCA MATERNIDADE") !== -1
  );
}

function vacinaAtualizadaPerfil(row, id) {
  const vac = (row.vacinas || {})[id] || {};
  return !!vac.completa;
}

function vacinasAplicadasPorAno(rows, anoFiltro) {
  const ano = String(anoFiltro || new Date().getFullYear());
  const ordem = ["dT", "Hepatite B", "COVID"];
  const contagem = { "dT": 0, "Hepatite B": 0, "COVID": 0 };

  (rows || []).forEach(function(r) {
    (r.vacinaEventos || []).forEach(function(e) {
      if (String(e.ano || "") !== ano) return;
      if (ordem.indexOf(e.tipo) === -1) return;
      contagem[e.tipo] = (contagem[e.tipo] || 0) + 1;
    });
  });

  return ordem.map(function(tipo) {
    return {
      nome: tipo + " - " + ano,
      quantidade: contagem[tipo] || 0
    };
  });
}

function grupoPendenciasVacPerfil(rows) {
  const contagem = { "dT": 0, "Hepatite B": 0, "COVID": 0 };

  (rows || []).forEach(function(r) {
    (r.vacPendencias || r.pendencias || []).forEach(function(p) {
      if (contagem[p] !== undefined) {
        contagem[p]++;
      }
    });
  });

  return ["dT", "Hepatite B", "COVID"].map(function(nome) {
    return { nome: nome, quantidade: contagem[nome] || 0 };
  });
}

function grupoPendenciasVacSetorTipo(rows) {
  const setores = {};

  (rows || []).forEach(function(r) {
    (r.vacPendencias || r.pendencias || []).forEach(function(p) {
      const setor = r.setor || "Não informado";

      if (!setores[setor]) {
        setores[setor] = { total: 0, tipos: {} };
      }

      setores[setor].total++;
      setores[setor].tipos[p] = (setores[setor].tipos[p] || 0) + 1;
    });
  });

  return Object.keys(setores).map(function(setor) {
    const tipos = setores[setor].tipos;
    const detalhe = Object.keys(tipos).sort().map(function(tipo) {
      return tipo + ": " + tipos[tipo];
    }).join(" | ");

    return {
      nome: setor,
      quantidade: setores[setor].total,
      detalhe: detalhe
    };
  }).sort(function(a, b) {
    return b.quantidade - a.quantidade || a.nome.localeCompare(b.nome);
  });
}

function cruzarPatologiasAfastamentosFamilia(rows, eventos) {
  const familiasPat = grupoCids(rows, "familiasCid").map(function(item) {
    return {
      familia: item.nome.split(" - ")[0],
      patologias: item.quantidade
    };
  });

  const afastPorFamilia = countBy(
    (eventos || []).filter(function(e) {
      return e.familiaCid;
    }),
    "familiaCid"
  );

  return familiasPat.map(function(item) {
    return {
      nome: item.familia + " - " + descricaoCidPerfil(item.familia),
      patologias: item.patologias,
      afastamentos: afastPorFamilia[item.familia] || 0,
      detalhe:
        "Patologias: " + item.patologias +
        " | Afastamentos: " + (afastPorFamilia[item.familia] || 0)
    };
  });
}

function cruzarPatologiasAfastamentosCid(rows, eventos) {
  const top = grupoCids(rows, "cids").slice(0, 10);
  const afastPorCid = {};

  (eventos || []).forEach(function(e) {
    const cid = cidComparavel(e.cid);
    if (cid) afastPorCid[cid] = (afastPorCid[cid] || 0) + 1;
  });

  return top.map(function(item) {
    return {
      nome: item.nome,
      patologias: item.quantidade,
      afastamentos: afastPorCid[cidComparavel(item.nome)] || 0,
      detalhe:
        "Patologias: " + item.quantidade +
        " | Afastamentos: " + (afastPorCid[cidComparavel(item.nome)] || 0)
    };
  });
}

function cidComparavel(cid) {
  const match = norm(cid).replace(/[^A-Z0-9]/g, "").match(/[A-Z][0-9]{2}/);
  return match ? match[0] : "";
}

function grupoHabitoPerfil(rows, key) {
  const contagem = {
    "SIM": 0,
    "NÃO": 0,
    "NÃO INFORMADO": 0
  };

  (rows || []).forEach(function(r) {
    const valor = norm(r[key]);
    let label = "NÃO INFORMADO";

    if (!valor || valor.indexOf("INFORMADO") !== -1 || valor.indexOf("REGISTRO") !== -1) {
      label = "NÃO INFORMADO";
    } else if (valor.indexOf("SIM") === 0) {
      label = "SIM";
    } else if (valor.indexOf("NAO") === 0) {
      label = "NÃO";
    }

    contagem[label]++;
  });

  return ["SIM", "NÃO", "NÃO INFORMADO"].map(function(nome) {
    return { nome: nome, quantidade: contagem[nome] || 0 };
  });
}

function renderTable(target, module, rows, cols) {
  const sorted = ordenar(module, rows || []);
  const pageSize = (APP.config && APP.config.pageSize) || 50;
  const page = APP.pageIndex[module] || 0;
  const totalPages = Math.max(Math.ceil(sorted.length / pageSize), 1);
  const safePage = Math.min(page, totalPages - 1);
  const start = safePage * pageSize;
  const current = sorted.slice(start, start + pageSize);

  APP.pageIndex[module] = safePage;

  const head = cols.map(function(col) {
    return (
      "<th>" +
        '<button class="sort" type="button" onclick="ordenarPor(\'' + module + "','" + col[0] + '\')">' +
          esc(col[1]) + setaSort(module, col[0]) +
        "</button>" +
      "</th>"
    );
  }).join("");

  const body = current.map(function(r) {
    return (
      "<tr>" +
      cols.map(function(col) {
        return "<td>" + esc(formatCell(r[col[0]])) + "</td>";
      }).join("") +
      "</tr>"
    );
  }).join("");

  const html =
    '<div class="table-wrap">' +
      "<table>" +
        "<thead><tr>" + head + "</tr></thead>" +
        "<tbody>" +
          (body || '<tr><td colspan="' + cols.length + '">Sem registros</td></tr>') +
        "</tbody>" +
      "</table>" +
    "</div>" +
    '<div class="pager">' +
      "<span>Exibindo " +
        (sorted.length ? start + 1 : 0) +
        "-" +
        Math.min(start + pageSize, sorted.length) +
        " de " +
        sorted.length +
      "</span>" +
      "<span>" +
        '<button class="btn-secondary" type="button" onclick="mudarPagina(\'' + module + "',-1)\">Anterior</button> " +
        '<button class="btn-secondary" type="button" onclick="mudarPagina(\'' + module + "',1)\">Próxima</button>" +
      "</span>" +
    "</div>";

  setHtml(target, html);
}

function ordenarPor(module, key) {
  const atual = APP.sort[module] || {};

  APP.sort[module] = {
    key: key,
    dir: atual.key === key && atual.dir === "asc" ? "desc" : "asc"
  };

  renderizarModulo(module);
}

function ordenar(module, rows) {
  const sort = APP.sort[module];

  if (!sort || !sort.key) return rows;

  return rows.slice().sort(function(a, b) {
    const av = formatCell(a[sort.key]);
    const bv = formatCell(b[sort.key]);

    return sort.dir === "asc"
      ? av.localeCompare(bv, "pt-BR", { numeric: true })
      : bv.localeCompare(av, "pt-BR", { numeric: true });
  });
}

function setaSort(module, key) {
  const sort = APP.sort[module] || {};

  if (sort.key !== key) return " ↕";

  return sort.dir === "asc" ? " ↑" : " ↓";
}

function mudarPagina(module, delta) {
  APP.pageIndex[module] = Math.max(
    0,
    (APP.pageIndex[module] || 0) + delta
  );

  renderizarModulo(module);
}

    ];

function baixarCsv(nome, linhas) {
  const csv = linhas.map(function(row) {
    return row.map(function(v) {
      return '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
    }).join(";");
  }).join("\n");

  const blob = new Blob(
    ["\ufeff" + csv],
    { type: "text/csv;charset=utf-8" }
  );

  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");

  link.href = url;
  link.download = nome;
  link.click();

  URL.revokeObjectURL(url);
}

function renderBars(id, rows, limit) {
  const list = (rows || []).slice(0, limit || 15);

  if (!list.length) {

    return;
  }

  const max = Math.max.apply(
    null,
    list.map(function(r) {
      return Number(r.quantidade || 0);
    })
  ) || 1;

  setHtml(
    id,
    '<div class="bar-list">' +
    list.map(function(r) {
      const largura = Math.max(
        (Number(r.quantidade || 0) / max) * 100,
        2
      );

      const title = escAttr(
        r.detalhe ? r.nome + " | " + r.detalhe : r.nome
      );

      return (
        '<div class="bar-row" title="' + title + '">' +
          '<div class="bar-label" title="' + title + '">' + esc(r.nome) + "</div>" +
          '<div class="bar-track"><div class="bar-fill" style="width:' + largura + '%"></div></div>' +
          '<div class="bar-value">' + fmt(r.quantidade) + "</div>" +
        "</div>"
      );
    }).join("") +
    "</div>"
  );
}

function renderHabitBars(id, rows) {
  const list = rows || [];
  const max = Math.max.apply(
    null,
    list.map(function(r) {
      return Number(r.quantidade || 0);
    })
  ) || 1;

  setHtml(
    id,
    '<div class="habit-list">' +
    list.map(function(r) {
      const largura = Math.max(
        (Number(r.quantidade || 0) / max) * 100,
        r.quantidade ? 3 : 0
      );

      return (
        '<div class="habit-row">' +
          '<div class="habit-label">' + esc(r.nome) + "</div>" +
          '<div class="habit-track"><div class="habit-fill" style="width:' + largura + '%"></div></div>' +
          '<div class="habit-value">' + fmt(r.quantidade) + "</div>" +
        "</div>"
      );
    }).join("") +
    "</div>"
  );
}

function renderComboChart(id, rows, limit) {
  const list = (rows || []).slice(0, limit || 12);

  if (!list.length) {
    setHtml(id, '<div class="empty">Sem dados</div>');
    return;
  }

  const max = Math.max.apply(
    null,
    list.map(function(r) {
      return Math.max(
        Number(r.patologias || 0),
        Number(r.afastamentos || 0)
      );
    })
  ) || 1;

  const points = list.map(function(r, i) {
    const x = ((i + 0.5) / list.length) * 100;
    const y = Math.max(
      0,
      Math.min(
        100,
        100 - ((Number(r.afastamentos || 0) / max) * 100)
      )
    );

    return x.toFixed(2) + "," + y.toFixed(2);
  }).join(" ");

  const lineSvg =
    '<svg class="combo-line" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">' +
      '<polyline points="' + points + '" fill="none" stroke="#2d64ad" stroke-width="1.6" vector-effect="non-scaling-stroke"/>' +
    "</svg>";

  const chart = list.map(function(r) {
    const pat = Number(r.patologias || 0);
    const af = Number(r.afastamentos || 0);
    const barH = Math.max((pat / max) * 100, pat ? 2 : 0);
    const dotY = Math.max(0, Math.min(100, 100 - ((af / max) * 100)));
    const title = escAttr(r.detalhe || ("Patologias: " + pat + " | Afastamentos: " + af));

    return (
      '<div class="combo-item" title="' + title + '">' +
        '<div class="combo-plot">' +
          '<div class="combo-bar-value" style="bottom:calc(' + barH + '% + 8px)">' + fmt(pat) + "</div>" +
          '<div class="combo-bar" style="height:' + barH + '%"></div>' +
          '<div class="combo-dot" style="top:' + dotY + '%"></div>' +
          '<div class="combo-dot-value" style="top:' + dotY + '%">' + fmt(af) + "</div>" +
        "</div>" +
        '<div class="combo-label" title="' + escAttr(r.nome) + '">' + esc(r.nome) + "</div>" +
      "</div>"
    );
  }).join("");

  setHtml(
    id,
    '<div class="combo-head">' +
      '<div class="combo-legend">' +
        '<span><i class="bar"></i>Patologias</span>' +
        '<span><i class="line"></i>Afastamentos</span>' +
      "</div>" +
      '<span class="combo-scale">Escala máxima: ' + esc(fmt(max)) + "</span>" +
    "</div>" +
    '<div class="combo-chart" style="--cols:' + list.length + '">' +
      lineSvg +
      chart +
    "</div>"
  );
}

/* =========================
   AGRUPAMENTOS
========================= */

function group(rows, key) {
  const objeto = {};

  (rows || []).forEach(function(r) {
    const nome = r[key] || "Não informado";
    objeto[nome] = (objeto[nome] || 0) + 1;
  });

  return Object.keys(objeto).map(function(nome) {
    return {
      nome: nome,
      quantidade: objeto[nome]
    };
  }).sort(function(a, b) {
    return b.quantidade - a.quantidade || a.nome.localeCompare(b.nome);
  });
}

function countBy(rows, key) {
  const objeto = {};

  (rows || []).forEach(function(r) {
    const nome = r[key] || "Não informado";
    objeto[nome] = (objeto[nome] || 0) + 1;
  });

  return objeto;
}

function grupoCids(rows, prop) {
  const objeto = {};

  (rows || []).forEach(function(r) {
    (r[prop] || []).forEach(function(cid) {
      const nome = prop === "familiasCid"
        ? cid + " - " + descricaoCidPerfil(cid)
        : cid;

      objeto[nome] = (objeto[nome] || 0) + 1;
    });
  });

  return Object.keys(objeto).map(function(nome) {
    return {
      nome: nome,
      quantidade: objeto[nome]
    };
  }).sort(function(a, b) {
    return b.quantidade - a.quantidade;
  });
}

function grupoPendenciasExames(rows) {
  const objeto = {};

  (rows || []).forEach(function(r) {
    (r.exames || []).forEach(function(e) {
      if (e.pendente) {
        objeto[e.nome] = (objeto[e.nome] || 0) + 1;
      }
    });
  });

  return Object.keys(objeto).map(function(nome) {
    return {
      nome: nome,
      quantidade: objeto[nome]
    };
  }).sort(function(a, b) {
    return b.quantidade - a.quantidade;
  });
}

function meses(rows) {
  const nomes = [
    "Jan", "Fev", "Mar", "Abr", "Mai", "Jun",
    "Jul", "Ago", "Set", "Out", "Nov", "Dez"
  ];

  const objeto = {};

  (rows || []).forEach(function(r) {
    if (r.mes) {
      objeto[r.mes] = (objeto[r.mes] || 0) + 1;
    }
  });

  return nomes.map(function(nome, i) {
    return {
      nome: nome,
      quantidade: objeto[i + 1] || 0
    };
  });
}

function distinct(rows, key) {
  const objeto = {};

  (rows || []).forEach(function(r) {
    if (r[key]) objeto[r[key]] = true;
  });

  return Object.keys(objeto);
}

/* =========================
   UTILITÁRIOS
========================= */

function sum(rows, fn) {
  return (rows || []).reduce(function(acc, r) {
    return acc + Number(fn(r) || 0);
  }, 0);
}

function media(total, qtd) {
  return qtd
    ? (total / qtd).toLocaleString("pt-BR", { maximumFractionDigits: 1 })
    : "0";
}

function pct(num, den) {
  return den
    ? ((num / den) * 100).toLocaleString(
        "pt-BR",
        { minimumFractionDigits: 1, maximumFractionDigits: 1 }
      ) + "%"
    : "0,0%";
}

function fmt(v) {
  return Number(v || 0).toLocaleString("pt-BR");
}

function formatCell(v) {
  return Array.isArray(v)
    ? v.join(", ")
    : (v == null ? "" : String(v));
}

function norm(v) {
  return String(v == null ? "" : v)
    .trim()
    .replace(/\s+/g, " ")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase();
}

function esc(v) {
  return String(v == null ? "" : v).replace(
    /[&<>"]/g,
    function(c) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;"
      }[c];
    }
  );
}

function escAttr(v) {
  return esc(v).replace(/'/g, "&#039;");
}

function setText(id, value) {
  const el = document.getElementById(id);

  if (el) {
    el.textContent = value == null ? "" : String(value);
  }
}

function setHtml(id, html) {
  const el = document.getElementById(id);

  if (el) {
    el.innerHTML = html;
  }
}

function getValue(id) {
  const el = document.getElementById(id);
  return el ? el.value : "";
}

function mostrarLoading(txt) {
  setText("loadingText", txt || "Carregando...");

  const loading = document.getElementById("loading");
  const conteudo = document.getElementById("conteudo");

  if (loading) loading.classList.remove("hidden");
  if (conteudo) conteudo.classList.add("hidden");
}

function esconderLoading() {
  const loading = document.getElementById("loading");
  const conteudo = document.getElementById("conteudo");

  if (loading) loading.classList.add("hidden");
  if (conteudo) conteudo.classList.remove("hidden");
}

function erroPortal(erro) {
  esconderLoading();

  const msg = erro && erro.message
    ? erro.message
    : String(erro || "Erro desconhecido");

  const detalhe =
    norm(msg).indexOf("AUTH") !== -1 ||
    norm(msg).indexOf("PERMISSION") !== -1 ||
    norm(msg).indexOf("AUTORIZ") !== -1
      ? "Autorize o web app no Google ou ajuste a implantação para executar como o proprietário."
      : "Abra o Registro de execução no Apps Script para ver a falha exata do backend.";

  setHtml(
    "conteudo",
    '<div class="empty">' +
      "<b>Erro ao carregar dados</b><br>" +
      esc(msg) +
      "<br><span>" +
      esc(detalhe) +
      "</span>" +
    "</div>"
  );
}

function descricaoCidPerfil(f) {
  return descricaoCid(f);
}

function descricaoCid(f) {
  const map = {
    A: "Infecciosas",
    B: "Infecciosas",
    C: "Neoplasias",
    D: "Sangue/imunidade",
    E: "Endócrinas",
    F: "Mentais",
    G: "Sistema nervoso",
    H: "Olhos/ouvidos",
    I: "Circulatório",
    J: "Respiratório",
    K: "Digestivo",
    L: "Pele",
    M: "Osteomuscular",
    N: "Geniturinário",
    O: "Gestação",
    P: "Perinatal",
    Q: "Congênitas",
    R: "Sintomas",
    S: "Lesões",
    T: "Lesões",
    U: "Especiais",
    V: "Externas",
    W: "Externas",
    X: "Externas",
    Y: "Externas",
    Z: "Fatores de saúde"
  };

  return map[f] || "Não informado";
}
